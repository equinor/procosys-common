name: ✏️ Verify formatting

on:
  pull_request:

permissions:
  contents: read

jobs:
  format-check:
    name: Verify formatting
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - { path: src, name: Auth }
          - { path: src, name: BlobStorage }
          - { path: src, name: Common }
          - { path: src/tests, name: Auth.Tests }
          - { path: src/tests, name: BlobStorage.Tests }
          - { path: src/tests, name: Common.Tests }
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify ${{ matrix.project.name }} formatting
        run: dotnet format ./${{ matrix.project.path }}/Equinor.ProCoSys.${{ matrix.project.name }} --verify-no-changes

  all-formatting-pass:
    name: All Formatting Pass
    runs-on: ubuntu-latest
    needs: [format-check]
    if: always()
    steps:
      - name: Check formatting results
        run: |
          if [ "${{ needs.format-check.result }}" != "success" ]; then
            echo "One or more formatting checks failed"
            exit 1
          fi
