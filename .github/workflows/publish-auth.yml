name: 📦 Publish Auth

on:
  pull_request: # TODO: Remove this trigger after initial testing
  push:
    branches: [main]
    paths:
      - src/Equinor.ProCoSys.Auth/**

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Pack & publish Auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Pack
        run: dotnet pack src/Equinor.ProCoSys.Auth/Equinor.ProCoSys.Auth.csproj --configuration Release --output ./nupkg

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --source https://nuget.pkg.github.com/equinor/index.json --api-key ${{ secrets.GITHUB_TOKEN }}
